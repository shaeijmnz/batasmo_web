# Allow OTP Edge Functions to be invoked before the user is logged in (uses service-role validation inside the function).
# Names must match functions deployed on your Supabase project.
[functions.signup-sms-otp-send]
verify_jwt = false

[functions.signup-sms-otp-verify]
verify_jwt = false

# Use header-forwarded auth + auth.getUser() inside function to avoid strict local JWT algorithm assumptions.
[functions.informational-ai-assistant]
verify_jwt = false
